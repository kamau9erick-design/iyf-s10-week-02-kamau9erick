<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>THIS IS A BOX MODEL</title>
        <link rel="stylesheet" href="box-model.css">
    </head>
    
    <body>
        <div class="box content">Content</div>
        <div  class="box padding">Padding</div>
        <div  class="box border">Border</div>
        <div  class="box margin">Margin</div>

        <h1>CSS Box Practice</h1>
        <p>The CSS box model is essentially a box that wraps around every HTML element</p>
        <p>It consists of: margins, borders, padding, and the actual content</p>
    </body>

</html>
