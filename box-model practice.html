<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title> WEEK 2 BOX MODEL PRACTICE</title>
    </head>
    <body>
        <h1>CSS Box Practice</h1>
        <p>The CSS box model is essentially a box that wraps around every HTML element</p>
        <style>
    
            .box{
            background-color:grey;
            padding: 50px ;
            margin: 40px;
            border:15px black ;

        }
        .content-box{
            background-color: grey;

        }
        .padding-box{
            padding: 50px;
            background-color: grey;
        }
        .border-box{
            border:15px black ;
        }
        .margin-box{
            margin: 40px;
            background-color: grey;
        }

        </style>
    </body>

</html>
